# =============================================================================
# nginx config para servir o build do Dia D (SPA React + Vite)
# =============================================================================
# Regras principais:
#  - Cache agressivo nos assets buildados (hash no filename ja invalida sozinho)
#  - Tudo que nao for arquivo fisico cai no /index.html (SPA routing)
#  - Gzip pra reduzir transferencia
#  - Headers basicos de seguranca
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressao pra texto, JS, CSS, JSON
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Assets com hash no nome (style-a1b2c3.css, vendor-xyz.js): cache 1 ano
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Arquivos estaticos simples (favicon, robots, etc)
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota nao encontrada serve o index.html
    # (React Router cuida do roteamento client-side)
    location / {
        try_files $uri $uri/ /index.html;

        # Index NUNCA pode cachear — senao novos deploys nao aparecem
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Headers de seguranca basicos
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Healthcheck pra Traefik / load balancer
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
